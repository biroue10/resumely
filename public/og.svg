<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06080F"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blob -->
  <ellipse cx="600" cy="200" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Logo icon -->
  <rect x="76" y="72" width="72" height="72" rx="16" fill="url(#accent)"/>
  <text x="112" y="122" font-family="'Inter', Arial, sans-serif" font-size="32" font-weight="800"
    fill="white" text-anchor="middle" letter-spacing="-1">AC</text>

  <!-- Wordmark -->
  <text x="164" y="124" font-family="'Inter', Arial, sans-serif" font-size="40" font-weight="800"
    fill="url(#accent)" letter-spacing="-1.5">ApplyCraft</text>

  <!-- Tagline -->
  <text x="76" y="280" font-family="'Inter', Arial, sans-serif" font-size="64" font-weight="800"
    fill="white" letter-spacing="-3">Free Resume &amp;</text>
  <text x="76" y="360" font-family="'Inter', Arial, sans-serif" font-size="64" font-weight="800"
    fill="white" letter-spacing="-3">Cover Letter Builder</text>

  <!-- Sub -->
  <text x="76" y="430" font-family="'Inter', Arial, sans-serif" font-size="28" font-weight="400"
    fill="#94A3B8" letter-spacing="-0.5">22 templates · 99 document languages · PDF &amp; DOCX · free</text>

  <!-- Pills -->
  <rect x="76" y="498" width="160" height="44" rx="22" fill="#6366F118"/>
  <text x="156" y="526" font-family="'Inter', Arial, sans-serif" font-size="18" font-weight="600"
    fill="#818CF8" text-anchor="middle">No sign-up</text>

  <rect x="252" y="498" width="180" height="44" rx="22" fill="#6366F118"/>
  <text x="342" y="526" font-family="'Inter', Arial, sans-serif" font-size="18" font-weight="600"
    fill="#818CF8" text-anchor="middle">ATS-friendly</text>

  <rect x="448" y="498" width="130" height="44" rx="22" fill="#6366F118"/>
  <text x="513" y="526" font-family="'Inter', Arial, sans-serif" font-size="18" font-weight="600"
    fill="#818CF8" text-anchor="middle">RTL ready</text>

  <!-- URL -->
  <text x="1124" y="590" font-family="'Inter', Arial, sans-serif" font-size="22" font-weight="600"
    fill="#475569" text-anchor="end">applycraft.io</text>
</svg>
