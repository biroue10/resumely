<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#06080F" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Primary SEO -->
    <title>ApplyCraft — Free Resume &amp; Cover Letter Builder</title>
    <meta name="description" content="Build a professional resume or cover letter in minutes. 22 templates, live preview, PDF &amp; DOCX download, 50+ languages. 100% free, no sign-up." />
    <meta name="keywords" content="resume builder, cover letter builder, CV maker, free resume template, ATS resume, PDF resume, multilingual resume, free CV builder" />
    <meta name="author" content="ApplyCraft" />
    <link rel="canonical" href="https://applycraft.io" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://applycraft.io" />
    <meta property="og:site_name" content="ApplyCraft" />
    <meta property="og:title" content="ApplyCraft — Free Resume &amp; Cover Letter Builder" />
    <meta property="og:description" content="Build a professional, ATS-friendly resume or cover letter in minutes. 22 templates, live preview, PDF &amp; DOCX download, 50+ languages. Free." />
    <meta property="og:image" content="https://applycraft.io/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ApplyCraft — free resume and cover letter builder" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ApplyCraft — Free Resume &amp; Cover Letter Builder" />
    <meta name="twitter:description" content="22 professional templates, live preview, PDF &amp; DOCX download. Build your resume in 50+ languages — free, no sign-up." />
    <meta name="twitter:image" content="https://applycraft.io/og.png" />
    <meta name="twitter:image:alt" content="ApplyCraft resume builder" />

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ApplyCraft",
      "url": "https://applycraft.io",
      "description": "Free resume and cover letter builder with 22 professional templates, live preview, and PDF/DOCX export in 50+ languages.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires a modern web browser",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "22 professional resume templates",
        "6 cover letter templates",
        "Live preview",
        "PDF download",
        "DOCX download",
        "50+ languages",
        "RTL support",
        "No sign-up required"
      ],
      "author": {
        "@type": "Person",
        "name": "Isaac Biroue"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; background: #06080F; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #1A2740; border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: #253A58; }
      input::placeholder, textarea::placeholder { color: #2D4060; }
      button { font-family: inherit; }
      input:focus, textarea:focus, select:focus {
        border-color: #6366F1 !important;
        box-shadow: 0 0 0 3px rgba(99,102,241,0.15) !important;
      }

      /* ── Animations ───────────────────────────────────────────────── */
      @keyframes acFadeUp {
        from { opacity: 0; transform: translateY(26px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes acFadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes acPulse {
        0%, 100% { box-shadow: 0 4px 24px rgba(99,102,241,0.4); }
        50%       { box-shadow: 0 8px 48px rgba(99,102,241,0.7), 0 0 0 5px rgba(99,102,241,0.1); }
      }
      @keyframes acGradientShift {
        0%, 100% { background-position: 0% 50%; }
        50%       { background-position: 100% 50%; }
      }
      .ac-card-hover {
        transition: transform 0.22s ease, box-shadow 0.22s ease !important;
      }
      .ac-card-hover:hover {
        transform: translateY(-6px) scale(1.015) !important;
        box-shadow: 0 16px 48px rgba(0,0,0,0.55) !important;
      }
      @keyframes acShake {
        0%,100% { transform: translateX(0); }
        18%     { transform: translateX(-7px); }
        36%     { transform: translateX(7px); }
        54%     { transform: translateX(-4px); }
        72%     { transform: translateX(4px); }
      }
      .ac-shake { animation: acShake 0.42s ease; }
    </style>
  </head>
  <body style="margin:0">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
