    <!-- JSON-LD: FAQ (mirrors the "Common questions" section) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is ApplyCraft really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The core builder, templates, language options, previews, and PDF or DOCX downloads are available without a paid tier, account, or credit card."
          }
        },
        {
          "@type": "Question",
          "name": "Do you store or sell my data?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ApplyCraft does not require an account profile to build a resume. Standard editing and export are browser-first; optional AI and translation helpers may process the text you choose to submit."
          }
        },
        {
          "@type": "Question",
          "name": "Are the templates ATS-compatible?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The templates are designed with readable typography, clear section headings, and ATS-conscious layouts to improve parsing compatibility."
          }
        },
        {
          "@type": "Question",
          "name": "Can I really use 99 document languages?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Type directly in any language, switch document labels and date formats across 99 document languages, and use the Translate button to convert an existing CV to a different language without rebuilding from scratch. RTL languages like Arabic are fully supported."
          }
        },
        {
          "@type": "Question",
          "name": "What download formats are available?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "PDF and DOCX. PDF is ideal for most applications. DOCX is available for recruiters or employers who need an editable file."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to create an account?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. There is no sign-up, no login, no email address required. Open the app and start building immediately."
          }
        }
      ]
    }
    </script>

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; background: #06080F; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #1A2740; border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: #253A58; }
      .ac-panel-noscroll { scrollbar-width: none; -ms-overflow-style: none; }
      .ac-panel-noscroll::-webkit-scrollbar { display: none; }
      input::placeholder, textarea::placeholder { color: #2D4060; }
      button { font-family: inherit; }
      input:focus, textarea:focus, select:focus {
        border-color: #6366F1 !important;
        box-shadow: 0 0 0 3px rgba(99,102,241,0.15) !important;
      }

      /* ── Animations ───────────────────────────────────────────────── */
      @keyframes acFadeUp {
        from { opacity: 0; transform: translateY(26px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes acFadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      /* Respect user preference for reduced motion */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
      @keyframes acPulse {
        0%, 100% { box-shadow: 0 4px 24px rgba(99,102,241,0.4); }
        50%       { box-shadow: 0 8px 48px rgba(99,102,241,0.7), 0 0 0 5px rgba(99,102,241,0.1); }
      }
      @keyframes acGradientShift {
        0%, 100% { background-position: 0% 50%; }
        50%       { background-position: 100% 50%; }
      }
      .ac-card-hover {
        transition: transform 0.22s ease, box-shadow 0.22s ease !important;
      }
      .ac-card-hover:hover {
        transform: translateY(-6px) scale(1.015) !important;
        box-shadow: 0 16px 48px rgba(0,0,0,0.55) !important;
      }
      @keyframes acShake {
        0%,100% { transform: translateX(0); }
        18%     { transform: translateX(-7px); }
        36%     { transform: translateX(7px); }
        54%     { transform: translateX(-4px); }
        72%     { transform: translateX(4px); }
      }
      .ac-shake { animation: acShake 0.42s ease; }

      /* ── Skip link ── */
      .skip-link {
        position: absolute;
        top: -100%;
        left: 8px;
        z-index: 99999;
        padding: 8px 16px;
        background: #6366F1;
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        border-radius: 0 0 6px 6px;
        text-decoration: none;
        transition: top 0.1s;
      }
      .skip-link:focus {
        top: 0;
        outline: 3px solid #fff;
        outline-offset: 2px;
      }

      /* ── Screen-reader only utility ── */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
